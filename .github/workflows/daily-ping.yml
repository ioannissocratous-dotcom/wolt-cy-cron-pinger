name: Daily snapshot ping

on:
  schedule:
    # Public-repo schedules are more reliable than private cron repos.
    - cron: "18 10 * * *"   # 13:18 Cyprus (EEST)
    - cron: "30 11 * * *"   # 14:30 Cyprus backup
    - cron: "0 12 * * *"    # 15:00 Cyprus backup
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CY campaign snapshot if missing
        env:
          DISPATCH_PAT: ${{ secrets.DISPATCH_PAT }}
          BOLTABLE_TOKEN: ${{ secrets.BOLTABLE_REPO_TOKEN }}
        run: |
          set -euo pipefail
          TODAY=$(TZ=Asia/Nicosia date +%Y-%m-%d)
          if [ -n "${BOLTABLE_TOKEN:-}" ] && gh api \
              "repos/boltable/wolt-cy-campaigns/contents/snapshots/${TODAY}.json" \
              --header "Authorization: Bearer ${BOLTABLE_TOKEN}" &>/dev/null; then
            echo "Snapshot for ${TODAY} exists."
            exit 0
          fi
          echo "Dispatching snapshot for ${TODAY}…"
          gh api --method POST \
            repos/ioannissocratous-dotcom/wolt-cy-campaigns-cron/dispatches \
            --header "Authorization: Bearer ${DISPATCH_PAT}" \
            -f event_type=daily-snapshot
